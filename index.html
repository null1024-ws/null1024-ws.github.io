    <nav class="social" aria-label="Social links">

      <a href="https://scholar.google.com/citations?user=El0fj_IAAAAJ&hl=en" target="_blank" rel="noopener noreferrer" aria-label="Google Scholar">

    <footer class="footer">
      <p>Last updated: March 13, 2026</p>
      <p id="busuanzi_container_site_pv">Total site visits: <span id="busuanzi_value_site_pv"></span></p>
    </footer>
  </main>

  <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  <script>
    (function () {
      var wechatButton = document.querySelector(".wechat-copy");
      if (!wechatButton) return;
      wechatButton.addEventListener("click", function () {
        var id = wechatButton.getAttribute("data-wechat-id");
        if (!id) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(id).then(function () {
            wechatButton.classList.add("copied");
            setTimeout(function () {
              wechatButton.classList.remove("copied");
            }, 500);
          });
        } else {
          var textarea = document.createElement("textarea");
          textarea.value = id;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "absolute";
          textarea.style.left = "-9999px";
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          document.body.removeChild(textarea);
          wechatButton.classList.add("copied");
          setTimeout(function () {
            wechatButton.classList.remove("copied");
          }, 500);
        }
      });
    })();

    window.setTimeout(function () {
      var value = document.getElementById("busuanzi_value_site_pv");
      var container = document.getElementById("busuanzi_container_site_pv");
      if (container && (!value || !value.textContent.trim())) {
        container.textContent = "Visitor counter unavailable.";
      }
    }, 3000);
  </script>
</body>
</html>
